[uwsgi]
# Python module
module = run:application

# Project directory
chdir = /home/dcblack/agentlocker/Agent-Locker/ai-agent-directory

# Use HTTP instead of socket for PythonAnywhere
http = :8000

# Process and thread settings
master = true
processes = 2
enable-threads = true
threads = 2

# Python settings
single-interpreter = true

# Virtual environment
virtualenv = /home/dcblack/agentlocker/Agent-Locker/ai-agent-directory/venv

# Logging
logto = /home/dcblack/agentlocker/Agent-Locker/ai-agent-directory/uwsgi.log

# Clean up on exit
vacuum = true