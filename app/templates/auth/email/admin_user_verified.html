<div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <img src="{{ url_for('static', filename='img/agent locker logo.png', _external=True) }}" 
         alt="Agent Locker Logo" 
         style="display: block; margin: 0 auto; height: 60px;">
    
    <h2 style="color: #1F2937; text-align: center; margin-top: 30px;">
        New User Verified 👤
    </h2>
    
    <div style="margin-top: 30px; padding: 20px; background-color: #F3F4F6; border-radius: 8px;">
        <h3 style="color: #1F2937; margin-top: 0;">User Details</h3>
        <ul style="color: #4B5563; margin: 0; padding-left: 20px;">
            <li style="margin-bottom: 10px;">Username: <strong>{{ user.username }}</strong></li>
            <li style="margin-bottom: 10px;">Email: <strong>{{ user.email }}</strong></li>
            <li style="margin-bottom: 10px">Verified at: <strong>{{ user.email_verified_at.strftime('%Y-%m-%d %H:%M:%S') }}</strong></li>
        </ul>
    </div>
    
    <div style="text-align: center; margin-top: 30px;">
        <a href="{{ url_for('user.manage_users', _external=True) }}"
           style="background-color: #2563EB; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; display: inline-block; margin-bottom: 10px;">
            View User Management
        </a>
        <br>
        <a href="{{ url_for('main.admin_overview', _external=True) }}"
           style="background-color: #059669; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; display: inline-block;">
            View Overview
        </a>
    </div>
</div>
