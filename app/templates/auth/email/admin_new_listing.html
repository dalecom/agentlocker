<div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <img src="{{ url_for('static', filename='img/agent locker logo.png', _external=True) }}" 
         alt="Agent Locker Logo" 
         style="display: block; margin: 0 auto; height: 60px;">
    
    <h2 style="color: #1F2937; text-align: center; margin-top: 30px;">
        New Agent Listing Submitted 🤖
    </h2>
    
    <div style="margin-top: 30px; padding: 20px; background-color: #F3F4F6; border-radius: 8px;">
        <h3 style="color: #1F2937; margin-top: 0;">Listing Details</h3>
        <ul style="color: #4B5563; margin: 0; padding-left: 20px;">
            <li style="margin-bottom: 10px;">Agent Name: <strong>{{ agent.name }}</strong></li>
            <li style="margin-bottom: 10px;">Provider: <strong>{{ agent.provider }}</strong></li>
            <li style="margin-bottom: 10px;">Submitted by: <strong>{{ agent.submitter.username if agent.submitter else 'Unknown' }}</strong></li>
            <li style="margin-bottom: 10px;">Submission Date: <strong>{{ agent.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</strong></li>
        </ul>
    </div>
    
    <div style="text-align: center; margin-top: 30px;">
        <a href="{{ url_for('agent.verify_listings', _external=True) }}"
           style="background-color: #2563EB; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; display: inline-block;">
            Review Listing
        </a>
    </div>
</div>
