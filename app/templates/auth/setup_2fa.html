{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <!-- Logo with Animation -->
        <div class="flex justify-center">
            <div class="relative w-20 h-20 flex-shrink-0">
                <img src="{{ url_for('static', filename='img/agent locker icon transparent.png') }}"
                     alt="Agent Locker Logo" 
                     class="w-full h-full object-contain animate-float">
                <div class="absolute -inset-0.5 bg-blue-500/10 rounded-2xl blur-xl -z-10"></div>
            </div>
        </div>

        <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
            Setup Two-Factor Authentication
        </h2>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10">
            <div class="space-y-6">
                <!-- QR Code -->
                <div class="text-center">
                    <img src="{{ qr_code }}" alt="QR Code" class="mx-auto">
                    <p class="mt-2 text-sm text-gray-600">
                        Scan this QR code with Google Authenticator
                    </p>
                    <div class="mt-2 p-2 bg-gray-50 rounded">
                        <code class="text-sm">{{ secret }}</code>
                    </div>
                </div>

                <!-- Verification Form -->
                <form method="POST" class="space-y-6">
                    {{ form.hidden_tag() }}
                    <div>
                        <label for="code" class="block text-sm font-medium text-gray-700">
                            Verification Code
                        </label>
                        <div class="mt-1">
                            <input type="text" 
                                   name="code" 
                                   id="code" 
                                   required
                                   class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                                   placeholder="Enter 6-digit code">
                        </div>
                    </div>

                    <button type="submit"
                            class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        Verify and Enable 2FA
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.animate-float {
    animation: float 3s ease-in-out infinite;
}
</style>
{% endblock %}
