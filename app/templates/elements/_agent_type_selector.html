<!-- Agent Type Section -->
<div>
    <h3 class="text-lg font-medium text-gray-900 mb-4">
        Type
        <i class="fas fa-info-circle text-red-400 cursor-help ml-1 text-xs" 
           data-tippy-content="Choose the type of AI solution that best fits your needs"></i>
    </h3>
    <div class="flex flex-col space-y-2">
        <label class="flex items-center justify-between px-3 py-2 text-sm rounded-lg hover:bg-gray-50 group cursor-pointer">
            <div class="flex items-center">
                <input type="radio" name="agent_type" value="tool" class="hidden peer" 
                       {% if agent_type == 'tool' %}checked{% endif %}>
                <span class="{% if agent_type == 'tool' %}opacity-100{% else %}opacity-0 group-hover:opacity-100{% endif %} mr-2">
                    <i class="fas fa-check-circle text-blue-500"></i>
                </span>
                <i class="fas fa-tools text-blue-400 mr-2"></i>
                <span class="text-gray-700 peer-checked:text-blue-500" 
                      data-tippy-content="AI Tools are standalone applications that perform specific tasks using AI. They're typically focused on one core function, like image generation or text analysis. Easy to use but less flexible than other options.">
                    AI Tools 
                </span>
            </div>
        </label>
        <label class="flex items-center justify-between px-3 py-2 text-sm rounded-lg hover:bg-gray-50 group cursor-pointer">
            <div class="flex items-center">
                <input type="radio" name="agent_type" value="agentic" class="hidden peer"
                       {% if agent_type == 'agentic' %}checked{% endif %}>
                <span class="{% if agent_type == 'agentic' %}opacity-100{% else %}opacity-0 group-hover:opacity-100{% endif %} mr-2">
                    <i class="fas fa-check-circle text-blue-500"></i>
                </span>
                <i class="fas fa-robot text-yellow-400 mr-2"></i>
                <span class="text-gray-700 peer-checked:text-yellow-500"
                      data-tippy-content="Agentic AI are autonomous systems that can understand, plan, and execute complex tasks. They can make decisions, learn from interactions, and handle multiple steps. More powerful than tools but may require more setup.">
                    Agentic AI
                </span>
            </div>
        </label>
        <label class="flex items-center justify-between px-3 py-2 text-sm rounded-lg hover:bg-gray-50 group cursor-pointer">
            <div class="flex items-center">
                <input type="radio" name="agent_type" value="platform" class="hidden peer"
                       {% if agent_type == 'platform' %}checked{% endif %}>
                <span class="{% if agent_type == 'platform' %}opacity-100{% else %}opacity-0 group-hover:opacity-100{% endif %} mr-2">
                    <i class="fas fa-check-circle text-blue-500"></i>
                </span>
                <i class="fas fa-layer-group text-green-400 mr-2"></i>
                <span class="text-gray-700 peer-checked:text-green-500"
                      data-tippy-content="Agent Platforms are comprehensive environments for creating, deploying, and managing multiple AI agents. They offer tools for development, monitoring, and scaling. Best for businesses looking to build custom AI solutions.">
                    Agent Platform
                </span>
            </div>
        </label>
    </div>
</div>
