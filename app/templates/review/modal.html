<div id="review-modal" class="modal hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full">
    <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
        <div class="mt-3">
            <h3 class="text-lg font-medium leading-6 text-gray-900 mb-4">Write a Review</h3>
            
            <form id="review-form" method="POST">
                {{ form.csrf_token }}
                <input type="hidden" name="rating" id="rating-input" value="0">
                
                <!-- Star Rating -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Rating</label>
                    <div class="flex space-x-1" id="star-rating">
                        {% for i in range(1, 6) %}
                        <button type="button" 
                                class="star-btn text-2xl text-gray-300 hover:text-yellow-400 cursor-pointer" 
                                data-rating="{{ i }}">
                            ★
                        </button>
                        {% endfor %}
                    </div>
                </div>

                <!-- Review Text -->
                <div class="mb-4">
                    <label for="review-text" class="block text-sm font-medium text-gray-700 mb-2">Your Review</label>
                    <textarea id="review-text" name="review_text" rows="4" 
                              class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
                              required></textarea>
                </div>

                <div class="flex justify-end space-x-2">
                    <button type="button" onclick="closeModal('review-modal')"
                            class="px-4 py-2 bg-gray-200 text-gray-800 rounded-md hover:bg-gray-300">
                        Cancel
                    </button>
                    <button type="submit"
                            class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                        Submit Review
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
